<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zoo Web View Wall</title>
    <script src="/config.js"></script>
    <script type="module" src="/example.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #05070a;
      }

      body {
        color: #f8fafc;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .wall-root {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: repeat(3, minmax(0, 1fr));
        width: 100vw;
        height: 100vh;
      }

      .wall-tile {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: #05070a;
        isolation: isolate;
      }

      .viewer-slot,
      .wall-view,
      .wall-view video {
        width: 100% !important;
        height: 100% !important;
      }

      .viewer-slot {
        position: absolute;
        inset: 0;
      }

      .wall-view {
        overflow: hidden !important;
        background: #05070a !important;
      }

      .wall-view video {
        display: block;
        object-fit: fill;
      }

      .tile-overlay,
      .tile-log {
        position: absolute;
        z-index: 2;
        border: 1px solid color-mix(in srgb, var(--accent, #2dd4bf) 48%, transparent);
        border-radius: 6px;
        background: rgba(3, 7, 18, 0.68);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(8px);
      }

      .tile-overlay {
        top: 16px;
        left: 16px;
        right: 16px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        padding: 12px 14px;
      }

      .tile-name {
        color: #f8fafc;
        font-size: 28px;
        font-weight: 800;
        line-height: 1.05;
      }

      .tile-role,
      .tile-state {
        color: #a7f3d0;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .tile-role {
        margin-top: 6px;
        color: color-mix(in srgb, var(--accent, #2dd4bf) 76%, #ffffff);
      }

      .tile-state {
        flex: 0 0 auto;
        border: 1px solid rgba(45, 212, 191, 0.4);
        border-radius: 999px;
        padding: 5px 10px;
        background: rgba(6, 78, 59, 0.46);
      }

      .tile-log {
        right: 16px;
        bottom: 16px;
        left: 16px;
        max-height: 28%;
        overflow: hidden;
        overflow-y: auto;
        padding: 10px;
        color: #dbeafe;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 22px;
        line-height: 1.35;
      }

      .log-row {
        white-space: nowrap;
      }

      .log-in {
        color: #a7f3d0;
      }

      .log-out {
        color: #bfdbfe;
      }

      .orchestrator-tile .tile-overlay {
        background: rgba(6, 47, 54, 0.72);
      }

      .orchestrator-tile .tile-name {
        font-size: 34px;
      }

      .prompt-panel {
        position: absolute;
        z-index: 3;
        top: 120px;
        right: 16px;
        left: 16px;
        display: grid;
        gap: 10px;
        padding: 14px;
        border: 1px solid rgba(45, 212, 191, 0.54);
        border-radius: 6px;
        background: rgba(3, 7, 18, 0.74);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(10px);
      }

      .prompt-label {
        color: #a7f3d0;
        font-size: 24px;
        font-weight: 800;
        line-height: 1.1;
      }

      .prompt-input {
        width: 100%;
        resize: none;
        border: 1px solid rgba(148, 163, 184, 0.42);
        border-radius: 4px;
        padding: 10px 12px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 22px/1.34 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        letter-spacing: 0;
        outline: none;
      }

      .prompt-input:focus {
        border-color: rgba(45, 212, 191, 0.88);
      }

      .prompt-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .prompt-button {
        min-width: 190px;
        border: 1px solid rgba(20, 184, 166, 0.92);
        border-radius: 4px;
        padding: 11px 18px;
        background: #0f766e;
        color: #ecfeff;
        font-size: 24px;
        font-weight: 800;
        line-height: 1;
      }

      .prompt-button:disabled {
        opacity: 0.62;
      }

      .prompt-status {
        color: #dbeafe;
        font: 20px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }
    </style>
  </head>
  <body></body>
</html>

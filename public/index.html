<html>
  <head>
    <title>Zoo Web View Wall</title>
    <script src="/config.js"></script>
    <script type="module" src="/example.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #05070a;
      }

      body {
        color: #e5e7eb;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .wall-root {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: repeat(3, minmax(0, 1fr));
        width: 100vw;
        height: 100vh;
      }

      .wall-tile {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: #05070a;
      }

      .wall-view {
        width: 100% !important;
        height: 100% !important;
      }

      .orchestrator-tile {
        isolation: isolate;
      }

      .orchestrator-view {
        display: block;
      }

      .orchestrator-overlay {
        position: absolute;
        z-index: 4;
        inset: 0;
        display: grid;
        grid-template-columns: minmax(520px, 0.84fr) minmax(0, 1.16fr);
        gap: 14px;
        padding: 16px;
        background:
          linear-gradient(90deg, rgba(5, 7, 10, 0.92), rgba(5, 7, 10, 0.68) 47%, rgba(5, 7, 10, 0.86)),
          radial-gradient(circle at 72% 28%, rgba(45, 212, 191, 0.12), transparent 38%);
      }

      .orchestrator-console,
      .graph-panel,
      .agent-card {
        min-width: 0;
        min-height: 0;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 6px;
        background: rgba(7, 10, 14, 0.78);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .orchestrator-console {
        display: grid;
        grid-template-rows: auto auto minmax(88px, 0.16fr) auto auto minmax(0, 1fr) minmax(92px, 0.24fr);
        gap: 10px;
        padding: 16px;
      }

      .orchestrator-heading,
      .graph-heading,
      .agent-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        min-width: 0;
      }

      .orchestrator-kicker,
      .prompt-label,
      .agent-role,
      .graph-count,
      .mode-pill,
      .center-status {
        color: #a7f3d0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2 {
        margin: 2px 0 0;
        color: #f8fafc;
        font-size: 28px;
        line-height: 1.05;
      }

      h2 {
        font-size: 22px;
      }

      .mode-pill,
      .graph-count,
      .agent-status {
        flex: 0 0 auto;
        border: 1px solid rgba(45, 212, 191, 0.35);
        border-radius: 999px;
        padding: 5px 9px;
        background: rgba(6, 78, 59, 0.42);
        color: #d1fae5;
        white-space: nowrap;
      }

      .orchestrator-prompt {
        width: 100%;
        min-width: 0;
        min-height: 0;
        resize: none;
        border: 1px solid rgba(148, 163, 184, 0.32);
        border-radius: 6px;
        padding: 12px;
        background: rgba(2, 6, 10, 0.76);
        color: #f8fafc;
        font: inherit;
        font-size: 16px;
        line-height: 1.35;
        outline: none;
      }

      .orchestrator-prompt:focus {
        border-color: rgba(45, 212, 191, 0.78);
      }

      .orchestrator-controls {
        display: flex;
        align-items: stretch;
        gap: 10px;
      }

      .orchestrator-controls button {
        border: 1px solid rgba(148, 163, 184, 0.42);
        border-radius: 6px;
        color: #f8fafc;
        cursor: pointer;
        font: inherit;
      }

      .orchestrator-controls button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .orchestrator-start {
        flex: 1;
        min-width: 260px;
        padding: 18px 24px;
        background: rgba(15, 118, 110, 0.88);
        font-size: 22px;
        font-weight: 800;
      }

      .orchestrator-stop {
        min-width: 84px;
        padding: 10px 13px;
        background: rgba(127, 29, 29, 0.68);
        font-size: 13px;
        font-weight: 700;
      }

      .center-status {
        min-height: 28px;
        border-left: 3px solid #2dd4bf;
        padding: 6px 0 0 10px;
        text-transform: none;
      }

      .websocket-log {
        overflow: hidden;
        overflow-y: auto;
        min-height: 0;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 6px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.58);
        color: #dbeafe;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 24px;
        line-height: 1.35;
      }

      .log-row {
        margin-bottom: 4px;
      }

      .log-in {
        color: #93c5fd;
      }

      .log-out {
        color: #f9a8d4;
      }

      .log-sys {
        color: #cbd5e1;
      }

      .graph-panel {
        display: flex;
        flex-direction: column;
        padding: 16px;
      }

      .assembly-section {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
      }

      .assembly-renderer {
        flex: 1;
        min-height: 0;
        margin-top: 8px;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.42);
      }

      .assembly-renderer .start {
        display: none;
      }

      .orchestrator-graph {
        flex: 1;
        min-height: 0;
        margin-top: 12px;
      }

      .orchestrator-graph,
      .agent-subgraph {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .orchestrator-graph svg,
      .agent-subgraph svg {
        display: block;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
      }

      .graph-edge {
        fill: none;
        stroke: rgba(148, 163, 184, 0.54);
        stroke-width: 2;
      }

      .graph-node rect {
        fill: rgba(2, 6, 10, 0.86);
        stroke: var(--node-color);
        stroke-width: 2;
      }

      .graph-name {
        fill: #f8fafc;
        font-size: 15px;
        font-weight: 800;
      }

      .graph-role {
        fill: #bae6fd;
        font-size: 11px;
        font-weight: 600;
      }

      .agent-monitor-tile {
        padding: 0;
      }

      .agent-monitor {
        position: absolute;
        inset: 0;
        display: grid;
        gap: 0;
        background: #05070a;
      }

      .agent-monitor-empty::after {
        content: "Awaiting Zookeeper assignment";
        display: grid;
        place-items: center;
        color: rgba(226, 232, 240, 0.28);
        font-size: 60px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .agent-card {
        position: relative;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 8px;
        margin: 8px;
        padding: 10px;
        border-color: color-mix(in srgb, var(--agent-color) 48%, rgba(148, 163, 184, 0.2));
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--agent-color) 13%, rgba(7, 10, 14, 0.9)), rgba(7, 10, 14, 0.88));
      }

      .agent-header {
        align-items: center;
      }

      .agent-title {
        overflow: hidden;
        color: #f8fafc;
        font-size: 17px;
        font-weight: 850;
        line-height: 1.05;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .agent-role {
        overflow: hidden;
        margin-top: 3px;
        color: #bfdbfe;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .agent-status {
        border-color: color-mix(in srgb, var(--agent-color) 70%, transparent);
        background: rgba(0, 0, 0, 0.4);
        color: #f8fafc;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .agent-status[data-status="complete"] {
        color: #bbf7d0;
      }

      .agent-status[data-status="error"] {
        color: #fecaca;
      }

      .agent-body {
        min-width: 0;
        min-height: 0;
      }

      .worker-body {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(220px, 0.8fr);
        gap: 8px;
      }

      .sub-orchestrator-body {
        display: grid;
        grid-template-columns: minmax(0, 1.3fr) minmax(240px, 0.9fr);
        grid-template-rows: minmax(0, 1fr) minmax(0, 0.72fr);
        gap: 8px;
      }

      .sub-orchestrator-body .agent-log {
        grid-column: 1 / -1;
      }

      .agent-viewer-slot,
      .agent-subgraph {
        min-width: 0;
        min-height: 0;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.42);
      }

      .agent-viewer-slot {
        overflow: hidden;
      }

      .agent-viewer-slot .start {
        display: none;
      }

      .agent-log {
        font-size: 22px;
      }

      @media (max-width: 2200px) {
        .orchestrator-overlay {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 0.82fr) minmax(0, 1.18fr);
        }

        .orchestrator-console {
          grid-template-rows: auto auto minmax(76px, 0.14fr) auto auto minmax(0, 1fr) minmax(88px, 0.22fr);
        }
      }
    </style>
  </head>
  <body></body>
</html>
